<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog Admin Dashboard</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      background-color: #f5f7fb;
    }
    .d-none { display: none !important; }
    
    /* Login Page Styles */
    #loginWrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
    }
    #loginWrapper .card {
      width: 100%;
      max-width: 420px;
      border: none;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    /* Dashboard Styles */
    .sidebar {
      min-height: 100vh;
      background: #111827;
      color: #e5e7eb;
    }
    .sidebar .nav-link {
      color: #9ca3af;
      border-radius: 0.375rem;
      margin-bottom: 0.25rem;
      text-align: left;
    }
    .sidebar .nav-link.active,
    .sidebar .nav-link:hover {
      color: #f9fafb;
      background-color: #1f2937;
    }
    .content-header { border-bottom: 1px solid #e5e7eb; }
    .card {
      border: none;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.12);
      border-radius: 0.75rem;
    }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #111827; }
    .nav-link { cursor: pointer; }
  </style>
</head>
<body>

  <!-- Login Section -->
  <div id="loginWrapper" class="d-none">
    <div class="card p-4">
      <div class="card-body">
        <div class="text-center mb-4">
          <div class="avatar-circle mx-auto mb-3" style="width: 60px; height: 60px; background: #3b82f6; color: white; display: flex; align-items: center; justify-content: center; border-radius: 50%;">
            <i class="fas fa-user-shield fa-2x"></i>
          </div>
          <h2 class="h4 fw-bold mb-1">Admin Access</h2>
          <p class="text-muted small">Sign in to manage your blog platform</p>
        </div>
        
        <form id="loginForm" onsubmit="return false;">
          <div class="mb-3">
            <label class="form-label small fw-semibold">EMAIL</label>
            <input type="email" id="email" class="form-control py-2" placeholder="admin@example.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">PASSWORD</label>
            <input type="password" id="password" class="form-control py-2" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="loginSubmitBtn">
            Sign In
          </button>
        </form>
        <div id="loginMessage" class="mt-3 text-center small"></div>
      </div>
    </div>
  </div>

  <!-- Dashboard Section -->
  <div id="dashboardWrapper" class="container-fluid d-none">
    <div class="row">
      <!-- Sidebar -->
      <nav class="col-md-3 col-lg-2 d-md-block sidebar px-3 py-3">
        <div class="d-flex align-items-center mb-4 px-2">
          <i class="fas fa-feather-alt me-2 text-primary"></i>
          <span class="h5 mb-0 fw-bold">PostFlow Admin</span>
        </div>

        <ul class="nav nav-pills flex-column" id="sidebarNav">
          <li class="nav-item">
            <button class="nav-link w-100 active" data-target="section-overview">
              <i class="fas fa-chart-line me-2"></i> Overview
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link w-100" data-target="section-posts">
              <i class="fas fa-file-alt me-2"></i> Posts
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link w-100" data-target="section-categories">
              <i class="fas fa-tags me-2"></i> Categories & Tags
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link w-100" data-target="section-comments">
              <i class="fas fa-comments me-2"></i> Comments
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link w-100 text-danger mt-4" onclick="adminDashboard.handleLogout()">
              <i class="fas fa-sign-out-alt me-2"></i> Logout
            </button>
          </li>
        </ul>
      </nav>

      <!-- Main Content -->
      <main class="col-md-9 ms-sm-auto col-lg-10 px-0">
        <header class="content-header bg-white px-4 py-3 d-flex justify-content-between align-items-center">
          <div>
            <h1 class="h5 mb-0" id="sectionTitle">Dashboard</h1>
            <div id="adminWelcome" class="small text-muted"></div>
          </div>
          <div>
            <button class="btn btn-primary px-3 btn-sm" id="headerNewPostBtn">
              <i class="fas fa-plus me-1"></i> New Post
            </button>
          </div>
        </header>

        <div class="p-4">
          <!-- Overview -->
          <section id="section-overview" class="dashboard-section">
            <!-- Stats -->
            <div class="row g-4 mb-4">
              <div class="col-md-3">
                <div class="card p-3">
                  <div class="text-muted small mb-1">Total Posts</div>
                  <div class="stat-value" id="stat-total-posts">0</div>
                </div>
              </div>
              <div class="col-md-3">
                <div class="card p-3 border-start border-success border-4">
                  <div class="text-muted small mb-1">Published</div>
                  <div class="stat-value" id="stat-published-posts">0</div>
                </div>
              </div>
              <div class="col-md-3">
                <div class="card p-3">
                  <div class="text-muted small mb-1">Total Views</div>
                  <div class="stat-value" id="stat-views">0</div>
                </div>
              </div>
              <div class="col-md-3">
                <div class="card p-3">
                  <div class="text-muted small mb-1">Comments</div>
                  <div class="stat-value" id="stat-comments">0</div>
                </div>
              </div>
            </div>

            <!-- Recent Table -->
            <div class="card">
              <div class="card-header bg-white py-3">
                <h6 class="mb-0 fw-bold">Recent Content</h6>
              </div>
              <div class="table-responsive">
                <table class="table mb-0 align-middle">
                  <thead class="table-light">
                    <tr>
                      <th>Title</th>
                      <th>Status</th>
                      <th>Category</th>
                      <th>Date</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
          </section>

          <!-- Posts Management -->
          <section id="section-posts" class="dashboard-section d-none">
             <div class="card mb-4 p-4">
                <h5 class="fw-bold mb-4">Create / Edit Post</h5>
                <form id="postForm" onsubmit="return false;">
                    <input type="hidden" id="postId" name="postId">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">POST TITLE</label>
                                <input type="text" id="postTitle" name="postTitle" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">SLUG (URL)</label>
                                <input type="text" id="postSlug" name="postSlug" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">EXCERPT</label>
                                <textarea name="postExcerpt" id="postExcerpt" class="form-control" rows="2"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">CONTENT</label>
                                <textarea name="postContent" id="postContent" class="form-control" rows="10" required></textarea>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card p-3 bg-light border-0 shadow-none mb-3">
                                <label class="form-label small fw-bold">STATUS</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="postStatus" id="statusPublished" value="published" checked>
                                    <label class="form-check-label" for="statusPublished">Published</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="postStatus" id="statusDraft" value="draft">
                                    <label class="form-check-label" for="statusDraft">Draft</label>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">CATEGORY</label>
                                <select id="postCategory" name="postCategory" class="form-select"></select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">POST IMAGE</label>
                                <input type="file" id="postImage" name="postImage" class="form-control mb-2">
                                <div id="imagePreview" class="d-none mt-2">
                                    <img src="" class="img-fluid rounded border shadow-sm">
                                </div>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary py-2 fw-bold" id="publishBtn">Save Post</button>
                                <button type="button" class="btn btn-outline-secondary" id="saveDraftBtn">Save Draft</button>
                            </div>
                        </div>
                    </div>
                </form>
             </div>

             <div class="card">
                <div class="card-header bg-white py-3">
                    <h6 class="mb-0 fw-bold">Manage Posts</h6>
                </div>
                <div class="table-responsive">
                    <table class="table mb-0 align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Title</th>
                                <th>Status</th>
                                <th>Author</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
             </div>
          </section>

          <!-- Categories Section -->
          <section id="section-categories" class="dashboard-section d-none">
              <div class="row g-4">
                  <div class="col-md-6">
                      <div class="card p-4">
                          <h6 class="fw-bold mb-3">Add Category</h6>
                          <form id="categoryForm" onsubmit="return false;">
                              <div class="mb-3">
                                  <label class="form-label small">Name</label>
                                  <input type="text" placeholder="Category name" class="form-control" required>
                              </div>
                              <div class="mb-3">
                                  <label class="form-label small">Slug</label>
                                  <input type="text" placeholder="productivity" class="form-control" required>
                              </div>
                              <div class="mb-3">
                                  <label class="form-label small">Description</label>
                                  <textarea class="form-control" rows="2"></textarea>
                              </div>
                              <button type="submit" class="btn btn-primary btn-sm">Save Category</button>
                          </form>
                          <hr>
                          <table class="table table-sm">
                              <thead><tr><th>Name</th><th>Count</th></tr></thead>
                              <tbody></tbody>
                          </table>
                      </div>
                  </div>
                  <div class="col-md-6">
                      <div class="card p-4">
                          <h6 class="fw-bold mb-3">Add Tag</h6>
                          <form id="tagForm" onsubmit="return false;">
                              <div class="mb-3">
                                  <label class="form-label small">Name</label>
                                  <input type="text" placeholder="Tag name" class="form-control" required>
                              </div>
                              <div class="mb-3">
                                  <label class="form-label small">Slug</label>
                                  <input type="text" placeholder="tag-slug" class="form-control" required>
                              </div>
                              <div class="mb-3">
                                  <label class="form-label small d-block">Color</label>
                                  <input type="color" class="form-control form-control-color w-100" value="#3b82f6">
                              </div>
                              <button type="submit" class="btn btn-primary btn-sm">Save Tag</button>
                          </form>
                          <hr>
                          <table class="table table-sm">
                              <thead><tr><th>Name</th></tr></thead>
                              <tbody></tbody>
                          </table>
                      </div>
                  </div>
              </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="admin.js"></script>
</body>
</html>
